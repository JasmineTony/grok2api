name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PNPM_VERSION: 11.15.1

jobs:
  backend-test:
    name: Backend test and audit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: grok2api
          POSTGRES_PASSWORD: grok2api-ci
          POSTGRES_DB: grok2api
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U grok2api -d grok2api"
          --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      TEST_POSTGRES_DSN: postgres://grok2api:grok2api-ci@127.0.0.1:5432/grok2api?sslmode=disable
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Test backend
        working-directory: backend
        run: go test -coverprofile=coverage.out ./...
      - name: Vet backend
        working-directory: backend
        run: go vet ./...
      - name: Check reachable Go vulnerabilities
        working-directory: backend
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: Verify Swagger document
        run: |
          make swagger
          git diff --exit-code -- backend/docs/docs.go backend/docs/swagger.json backend/docs/swagger.yaml

  backend-race:
    name: Backend race
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: grok2api
          POSTGRES_PASSWORD: grok2api-ci
          POSTGRES_DB: grok2api
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U grok2api -d grok2api"
          --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      TEST_POSTGRES_DSN: postgres://grok2api:grok2api-ci@127.0.0.1:5432/grok2api?sslmode=disable
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Race test backend
        working-directory: backend
        run: go test -race -p 1 ./...

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Audit dependencies
        working-directory: frontend
        run: pnpm audit --audit-level high
      - name: Verify frontend
        working-directory: frontend
        run: pnpm verify
      - name: Upload sanitized performance summary
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: frontend-performance-summary-${{ github.run_id }}
          path: .cache/performance-summary
          if-no-files-found: error
          retention-days: 14

  code-audit:
    name: Repository code audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Static code, architecture, duplication, and unused dependency audit
        working-directory: frontend
        run: |
          pnpm audit:code
          pnpm audit:architecture
          pnpm audit:duplicates
          pnpm audit:unused
      - name: Check patch cleanliness and conflict markers
        run: |
          git diff --check
          ! git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- ':!frontend/pnpm-lock.yaml'

  repository-governance:
    name: Workflow and secret audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: backend/go.mod
          cache: false
      - name: Lint GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 -color
      - name: Scan the working tree for secrets
        run: go run github.com/zricethezav/gitleaks/v8@v8.30.1 detect --source . --redact --config .gitleaks.toml --log-opts=-1 --verbose

  container-config:
    name: Container configuration and health smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Lint Dockerfile
        run: docker run --rm -i -v "$PWD/.hadolint.yaml:/.hadolint.yaml:ro" hadolint/hadolint:v2.14.0-debian hadolint --config /.hadolint.yaml - < Dockerfile
      - name: Prepare ephemeral smoke configuration
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          source = Path("config.example.yaml").read_text(encoding="utf-8")
          source = source.replace("replace-with-at-least-32-characters", os.urandom(32).hex())
          source = source.replace("replace-with-base64-key", base64.b64encode(os.urandom(32)).decode("ascii"))
          source = source.replace("replace-with-a-strong-password", "Smoke-" + os.urandom(24).hex())
          Path(os.environ["RUNNER_TEMP"], "grok2api-config.yaml").write_text(source, encoding="utf-8")
          PY
      - name: Validate Compose configuration
        shell: bash
        run: |
          export GROK2API_CONFIG="$RUNNER_TEMP/grok2api-config.yaml"
          export GROK2API_IMAGE="grok2api-ci:local"
          export GROK2API_PORT="18000"
          docker compose config --quiet
      - name: Build local smoke image
        run: docker build --platform linux/amd64 --tag grok2api-ci:local .
      - name: Run Compose health smoke
        shell: bash
        run: |
          export GROK2API_CONFIG="$RUNNER_TEMP/grok2api-config.yaml"
          export GROK2API_IMAGE="grok2api-ci:local"
          export GROK2API_PORT="18000"
          docker compose up -d --no-build
          for attempt in $(seq 1 60); do
            status=$(docker inspect --format='{{.State.Health.Status}}' grok2api 2>/dev/null || true)
            if [ "$status" = "healthy" ]; then
              curl --fail --silent --show-error http://127.0.0.1:18000/healthz
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              docker compose logs --no-color
              exit 1
            fi
            sleep 2
          done
          docker compose logs --no-color
          exit 1
      - name: Stop smoke services
        if: always()
        shell: bash
        run: |
          export GROK2API_CONFIG="$RUNNER_TEMP/grok2api-config.yaml"
          export GROK2API_IMAGE="grok2api-ci:local"
          export GROK2API_PORT="18000"
          docker compose down --volumes --remove-orphans

  browser-smoke:
    name: Firefox and WebKit smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies and smoke browsers
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps firefox webkit
      - name: Run Firefox and WebKit smoke
        working-directory: frontend
        run: pnpm test:e2e --project=firefox-smoke --project=webkit-smoke --workers=1
      - name: Upload cross-browser diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: cross-browser-diagnostics-${{ github.run_id }}
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 7

  visual:
    name: Visual regression
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies and Chromium
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install chromium
      - name: Run Chromium layout and accessibility regression
        working-directory: frontend
        run: pnpm test:e2e --project=desktop --project=tablet --project=mobile
      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: playwright-diagnostics-${{ github.run_id }}
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 7

  verify:
    name: Verify
    needs:
      - backend-test
      - backend-race
      - frontend-quality
      - code-audit
      - repository-governance
      - container-config
      - browser-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Confirm required verification jobs
        run: echo "Backend, race, frontend, workflow, secret, container, and browser audits passed."

  build-image:
    name: Build image (${{ matrix.arch }})
    needs: [verify, visual]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, platform: linux/amd64, runner: ubuntu-24.04 }
          - { arch: arm64, platform: linux/arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build image without publishing
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=ci-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.arch }}
          provenance: false
          sbom: false
