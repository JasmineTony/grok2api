name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Vet backend
        working-directory: backend
        run: go vet ./...

      - name: Check reachable Go vulnerabilities
        working-directory: backend
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Verify Swagger document
        run: |
          make swagger
          git diff --exit-code -- backend/docs/docs.go backend/docs/swagger.json backend/docs/swagger.yaml

      - name: Set up pnpm
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 11.15.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Audit frontend dependencies
        working-directory: frontend
        run: pnpm audit --audit-level high

      - name: Type-check frontend
        working-directory: frontend
        run: pnpm typecheck

      - name: Test frontend
        working-directory: frontend
        run: pnpm test

      - name: Lint frontend
        working-directory: frontend
        run: pnpm lint

      - name: Check icon imports
        working-directory: frontend
        run: pnpm check:icons

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Check frontend bundle budgets
        working-directory: frontend
        run: pnpm check:bundle

  build_image:
    name: Build image (${{ matrix.arch }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build image without publishing
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=ci-${{ matrix.arch }}
          provenance: false
          sbom: false
